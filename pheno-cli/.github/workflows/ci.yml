name: CI

on:
  push:
    branches: [main, feature/*, bugfix/*, docs/*, release/*, hotfix/*]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        go-version: ['1.21', '1.22']
    
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Go
        uses: actions/setup-go@7b8cf10d4e4a01d4992d18a89f4d7dc5a3e6d6f4
        with:
          go-version: $123matrix.go-version125

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Run tests
        run: go test ./... -v -race -coverprofile=coverage.out

      - name: Upload coverage
        uses: codecov/codecov-action@ab904c41d6ece82784817410c45d8b8c02684457
        with:
          files: ./coverage.out
      

  phenotype-validate:
    runs-on: ubuntu-latest
    uses: KooshaPari/phenotypeActions/.github/workflows/validate-governance.yml@main
