# MCP (Model Context Protocol) Configuration for Cross-Project Testing
# Modern free testing stack: Vitest + Playwright + pytest

version: "1.0"

# MCP Servers for Testing Orchestration
servers:
  # Playwright MCP for browser-based testing
  playwright:
    command: npx
    args: ["@anthropic-ai/mcp-playwright", "start"]
    env:
      PLAYWRIGHT_BROWSERS_PATH: "0"
    description: "Browser automation for E2E and visual regression tests"

  # Vitest MCP for unit tests
  vitest:
    command: npx
    args: ["vitest", "run", "--reporter=json"]
    description: "Fast unit testing with Vite"
    coverage:
      provider: v8
      thresholds:
        lines: 80

  # pytest MCP for Python tests
  pytest:
    command: pytest
    args: ["--json-report", "--json-report-file=report.json"]
    description: "Python testing with coverage"
    coverage:
      tool: pytest-cov
      thresholds:
        lines: 80

  # Cucumber MCP for BDD tests
  cucumber:
    command: npx
    args: ["@cucumber/cucumber", "run"]
    description: "Gherkin BDD test execution"
    patterns:
      - "tests/bdd/**/*.feature"

  # Cargo MCP for Rust tests
  cargo:
    command: cargo
    args: ["test", "--workspace", "--", "--format=json"]
    description: "Rust test execution with cargo"
    features:
      - test-utils

  # GitHub Actions MCP for CI orchestration
  github-actions:
    command: gh
    args: ["workflow", "run", "--repo", "${REPO}", "${WORKFLOW}"]
    env:
      GITHUB_TOKEN: "${GITHUB_TOKEN}"
    description: "Trigger GitHub Actions workflows for cross-repo testing"

# Testing Workflows
test_workflows:
  nano_vms_vm_lifecycle:
    description: "Test NanoVMS VM tier isolation end-to-end"
    steps:
      - server: vitest
        action: "run_tests"
        params:
          pattern: "tests/**/*.test.ts"
      - server: playwright
        action: "run_tests"
        params:
          spec: "tests/playwright/**/*.spec.ts"
          browsers: ["chromium", "firefox", "webkit"]
      - server: cargo
        action: "test"
        params:
          package: "nanovms-core"
          features: ["test-utils"]

  agileplus_bidirectional_sync:
    description: "Test AgilePlus Plane.so integration"
    steps:
      - server: cucumber
        action: "run"
        params:
          features: "tests/bdd/**/*.feature"
      - server: playwright
        action: "run_tests"
        params:
          spec: "tests/playwright/**/*.spec.ts"
          visual_checks: true

  thegent_agent_conversations:
    description: "Test thegent multi-agent orchestration"
    steps:
      - server: pytest
        action: "run"
        params:
          pattern: "tests/**/test_*.py"
      - server: vitest
        action: "run_tests"
        params:
          pattern: "tests/**/*.test.ts"

# Self-Healing Configuration (Free alternatives)
self_healing:
  enabled: true
  strategies:
    - name: "smart_locator_update"
      description: "Update Playwright locators when UI changes"
      trigger: "test_failure_rate > 30%"
      action: "suggest_fixes"

    - name: "test_auto_update"
      description: "Auto-update tests when spec changes"
      trigger: "spec_commit"
      action: "suggest_regeneration"

    - name: "visual_baseline_refresh"
      description: "Update visual baselines for intentional changes"
      trigger: "manual_approval"
      action: "accept_new_baseline"

# Test Generation Rules (Free alternatives)
generation_rules:
  test_first:
    description: "Generate tests before implementation"
    enabled: true

  fr_traceability:
    description: "Every test must trace to a Functional Requirement"
    enabled: true
    pattern: "# Traces to: FR-{PROJECT}-{NNN}"

  coverage_requirements:
    unit_tests: 80
    integration_tests: 70
    e2e_tests: 50

  behavior_focus:
    description: "Test behavior, not implementation"
    enabled: true
    avoid:
      - "Testing internal methods"
      - "Testing private functions"
      - "Testing implementation details"
    prefer:
      - "Testing public APIs"
      - "Testing user journeys"
      - "Testing observable outcomes"

# Notification & Reporting
notifications:
  slack:
    webhook: "${SLACK_WEBHOOK_URL}"
    channels:
      - "#testing-alerts"

  dashboard:
    url: "https://dashboard.kooshapari.com/testing"
    refresh_interval: "5m"

# Metrics Collection
metrics:
  enabled: true
  collectors:
    - test_duration
    - flakiness_rate
    - coverage_delta
    - defect_escape_rate
