[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "pheno-atoms"
version = "0.1.0"
description = "Core atom types and validation for Phenotype SDK"
readme = "README.md"
requires-python = ">=3.10"
authors = [
    {name = "Phenotype Team", email = "info@phenotype.dev"}
]
license = {text = "MIT"}
keywords = [
    "atoms",
    "types",
    "validation",
    "phenotype",
    "sdk",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]
dependencies = [
    "pydantic>=2.0",
    "typing-extensions>=4.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "pytest-asyncio>=0.23.0",
    "ruff>=0.4.0",
    "black>=24.0",
    "mypy>=1.10.0",
    "faker>=24.0",
]

[project.urls]
Homepage = "https://github.com/KooshaPari/phenotype-infrakit"
Repository = "https://github.com/KooshaPari/phenotype-infrakit.git"
Issues = "https://github.com/KooshaPari/phenotype-infrakit/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/pheno_atoms"]

[tool.pytest.ini_options]
minversion = "8.0"
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "--cov=src/pheno_atoms --cov-report=term-missing --cov-report=html"

[tool.black]
line-length = 100
target-version = ["py310", "py311", "py312", "py313"]

[tool.ruff]
line-length = 100
target-version = "py310"
select = ["E", "F", "W", "I", "N", "UP", "D"]

[tool.ruff.per-file-ignores]
"__init__.py" = ["F401"]
"tests/**" = ["D100", "D101", "D102", "D103"]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
