[build-system]
requires = ["setuptools>=68.0", "setuptools-scm>=7.0"]
build-backend = "setuptools.build_meta"

[project]
name = "pheno-mcp"
version = "1.0.0"
description = "Standalone MCP tooling package for Phenotype - FastMCP wrappers, tool registry, and CrewAI orchestration"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
authors = [
    {name = "Phenotype Team", email = "team@phenotype.dev"}
]
keywords = [
    "mcp",
    "model-context-protocol",
    "fastmcp",
    "crewai",
    "agents",
    "orchestration",
    "tools"
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
]

dependencies = [
    "pydantic>=2.0",
    "typing-extensions>=4.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21.0",
    "pytest-cov>=4.0",
    "black>=23.0",
    "ruff>=0.1.0",
    "mypy>=1.0",
    "isort>=5.12",
]
docs = [
    "sphinx>=7.0",
    "sphinx-rtd-theme>=1.2",
]
crewai = [
    "crewai>=0.1.0",
]
fastmcp = [
    "fastmcp>=0.1.0",
]

[project.urls]
Homepage = "https://github.com/KooshaPari/phenotype-shared"
Documentation = "https://phenotype-infrakit.readthedocs.io"
Repository = "https://github.com/KooshaPari/phenotype-shared.git"
Issues = "https://github.com/KooshaPari/phenotype-shared/issues"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
include = ["pheno_mcp*"]

[tool.pytest.ini_options]
minversion = "7.0"
addopts = "-ra -q --strict-markers --cov=src/pheno_mcp --cov-report=term-missing --cov-report=html"
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]

[tool.coverage.run]
branch = true
source = ["src/pheno_mcp"]
omit = [
    "*/tests/*",
    "*/test_*.py",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "class .*\\bProtocol\\):",
    "@(abc\\.)?abstractmethod",
]

[tool.black]
line-length = 100
target-version = ["py310", "py311", "py312", "py313"]
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
)/
'''

[tool.ruff]
line-length = 100
target-version = "py310"
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "C",    # flake8-comprehensions
    "B",    # flake8-bugbear
    "D",    # pydocstyle
]
ignore = [
    "E501",  # line too long
    "D101",  # Missing docstring in public class
    "D102",  # Missing docstring in public method
]

[tool.ruff.per-file-ignores]
"__init__.py" = ["F401"]
"tests/**" = ["D100", "D101", "D102", "D103"]

[tool.isort]
profile = "black"
line_length = 100
skip_gitignore = true
known_first_party = ["pheno_mcp"]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = [
    "tests.*",
]
ignore_errors = true
