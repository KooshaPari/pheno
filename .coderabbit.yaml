# CodeRabbit Configuration
# Phase 0: AI-powered code review rules and customization

# Review rules and patterns
reviews:
  # Request a human review
  request_changes_prompt: |
    This PR requires human review. Specific focus areas:
    - Security implications
    - Architectural decisions
    - Breaking changes
    - Performance impact

  # Summary generation settings
  auto_summary: true
  collapse_unnecessary_comments: true
  publish_review_comment: true

  # PR size limits
  max_pr_size: 500  # lines
  fail_on_size_exceed: false
  warn_on_size: 400

# Language-specific rules
language_rules:
  rust:
    enabled: true
    focus_areas:
      - unsafe_blocks
      - error_handling
      - performance_implications
      - api_design
      - test_coverage
    enforce_rules:
      - "use_thiserror_for_errors"
      - "avoid_unwrap"
      - "proper_error_handling"
      - "async_await_patterns"
    patterns_to_watch:
      - "^unsafe "
      - "\.unwrap\(\)"
      - "\.expect\("
      - "std::panic"
    complexity_threshold: 15  # Cognitive complexity

  python:
    enabled: true
    focus_areas:
      - type_hints
      - error_handling
      - async_patterns
      - test_coverage
    enforce_rules:
      - "use_type_hints"
      - "proper_exception_handling"
      - "docstring_format"

  markdown:
    enabled: true
    focus_areas:
      - spelling
      - formatting
      - links
    enforce_rules:
      - "valid_markdown"
      - "broken_links"

# Review focus areas by file pattern
file_rules:
  # Cargo manifests
  "**/Cargo.toml":
    review_type: "mandatory"
    focus:
      - dependency_versions
      - features
      - workspace_structure
      - deprecated_deps
    require_semver: true
    warn_on_major_version_change: true

  # Critical configuration files
  "review.toml":
    review_type: "mandatory"
    require_approval: true
    human_review_required: true

  ".github/workflows/**":
    review_type: "mandatory"
    focus:
      - security
      - ci_cd_best_practices
      - secret_exposure
    human_review_required: true

  # Rust source files
  "crates/phenotype-*/src/**/*.rs":
    review_type: "standard"
    focus:
      - unsafe_code
      - error_handling
      - api_design
      - test_coverage
      - documentation
    min_test_coverage: 0.80
    enforce_doc_comments: true

  # Tests
  "**/test*.rs":
    review_type: "light"
    focus:
      - test_quality
      - coverage
      - assertion_clarity
    skip_complexity_check: false

  # Documentation
  "**/*.md":
    review_type: "light"
    focus:
      - clarity
      - formatting
      - broken_links
    auto_approve: false
    allow_auto_merge: true

  # Archived files
  ".archive/**":
    review_type: "minimal"
    skip_all_checks: false
    allow_auto_merge: true

# Rule severity levels
rule_severity:
  critical:
    blocking: true
    require_human_review: true
    auto_approve: false

  high:
    blocking: false
    require_human_review: false
    auto_approve: false

  medium:
    blocking: false
    require_human_review: false
    auto_approve: false

  low:
    blocking: false
    require_human_review: false
    auto_approve: true

# Specific code review rules
code_review_rules:
  # Security rules
  security:
    - rule: "detect_secrets"
      enabled: true
      severity: "critical"
      message: "Potential secrets detected"

    - rule: "unsafe_code_review"
      enabled: true
      severity: "high"
      message: "Unsafe code requires careful review"
      enforce: true

    - rule: "sql_injection_check"
      enabled: true
      severity: "critical"
      message: "Potential SQL injection vulnerability"

    - rule: "command_injection_check"
      enabled: true
      severity: "critical"
      message: "Potential command injection vulnerability"

  # Performance rules
  performance:
    - rule: "n_plus_one_check"
      enabled: true
      severity: "medium"
      message: "Potential N+1 query problem"

    - rule: "large_allocation_check"
      enabled: true
      severity: "medium"
      message: "Large memory allocation detected"

    - rule: "blocking_operation_in_async"
      enabled: true
      severity: "high"
      message: "Blocking operation in async context"
      languages: ["rust", "python", "javascript"]

  # Design/Architecture rules
  architecture:
    - rule: "circular_dependency_check"
      enabled: true
      severity: "high"
      message: "Circular dependency detected"

    - rule: "api_contract_check"
      enabled: true
      severity: "high"
      message: "API contract violation"

    - rule: "breaking_change_detection"
      enabled: true
      severity: "high"
      message: "Breaking API change detected"

  # Test rules
  testing:
    - rule: "test_coverage_check"
      enabled: true
      severity: "medium"
      min_coverage: 0.80
      message: "Test coverage below threshold"

    - rule: "missing_test_check"
      enabled: true
      severity: "medium"
      message: "Missing tests for new code"

    - rule: "test_naming_convention"
      enabled: true
      severity: "low"
      message: "Test name should follow pattern: test_<function>_<scenario>"

  # Documentation rules
  documentation:
    - rule: "missing_docstring"
      enabled: true
      severity: "medium"
      languages: ["rust", "python"]
      message: "Public API missing documentation"

    - rule: "outdated_example"
      enabled: false
      severity: "low"
      message: "Example code may be outdated"

    - rule: "broken_links"
      enabled: true
      severity: "medium"
      message: "Broken link in documentation"

# Auto-suggestion settings
suggestions:
  enabled: true
  provide_fix_suggestions: true
  suggest_tests: true
  suggest_docs: true

# Comment settings
comments:
  include_codeblock_context: true
  max_comment_length: 500
  summary_type: "markdown"
  inline_comments: true
  highlight_new_lines_only: true

# Review blocking configuration
blocking:
  failed_status_checks: true
  merge_conflicts: true
  draft_pr: true
  insufficient_reviews: true
  insufficient_approval_percentage: true

# Approval settings
approvals:
  require_code_owner_approval: false
  dismiss_stale_reviews_on_push: true
  require_review_from_multiple_teams: false

# Auto-merge configuration
auto_merge:
  enabled: true
  conditions:
    - all_checks_pass
    - approval_threshold_met
    - no_merge_conflicts
    - branch_up_to_date
  squash_merge: true
  delete_branch: true
  require_status_checks:
    - "CodeQL (rust)"
    - "Cargo Audit"
    - "Cargo Deny"

# Integration settings
integrations:
  slack:
    enabled: false
    notify_on_request: false
    notify_on_completion: true

  github:
    enabled: true
    post_comments: true
    add_labels: true

# Debugging and logging
debug:
  enabled: false
  log_level: "info"
  log_file: "logs/coderabbit.log"

# Version
version: "1.0"
last_updated: "2026-03-30"
