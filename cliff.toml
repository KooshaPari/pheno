# git-cliff configuration for phenotype-shared (Phenotype Rust workspace monorepo)
# https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog

All notable changes to AgilePlus are documented here.

Format: [Keep a Changelog](https://keepachangelog.com/en/1.1.0/)
Versioning: [Semantic Versioning](https://semver.org/spec/v2.0.0.html)

> Run `git cliff --unreleased` to preview the next release entry.

---
"""
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}*({{ commit.scope }})* {% endif %}\
            {{ commit.message | upper_first }}\
            {% if commit.breaking %} [**BREAKING**]{% endif %}
    {%- endfor %}
{% endfor %}\n
"""
trim = true
footer = """
---
<!-- generated by git-cliff -->
"""

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
commit_preprocessors = [
  { pattern = '\(#(\d+)\)', replace = "([#${1}](https://github.com/KooshaPari/agileplus/issues/${1}))" },
]
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^doc|^docs", group = "Documentation" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactoring" },
  { message = "^test", group = "Testing" },
  { message = "^chore|^ci|^build", group = "Maintenance" },
  { message = "^security|^sec", group = "Security" },
  { message = "^revert", group = "Reverts" },
  { message = "^merge", skip = true },
  { message = ".*", group = "Other" },
]
protect_breaking_commits = true
filter_commits = false
sort_commits = "oldest"
tag_pattern = "v[0-9].*"
skip_tags = ".*-unknown|backup/.*"
topo_order = false
