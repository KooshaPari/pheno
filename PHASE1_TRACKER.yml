# Risks & Blockers
risks:
  - id: "RISK-001"
    title: "Snyk Token Authentication"
    severity: "high"
    status: "active"
    description: "Snyk integration blocked without valid SNYK_TOKEN"
    mitigation: "Coordinate with security team to generate token by 2026-04-01"
    impact: "3-day delay to Snyk deployment if unresolved"

  - id: "RISK-002"
    title: "Sentry DSN Configuration"
    severity: "medium"
    status: "active"
    description: "SDKs ready but DSNs not yet provided for all language/repos"
    mitigation: "Create Sentry projects and provide DSNs in bulk (2026-04-01)"
    impact: "2-day delay to Sentry deployment"

  - id: "RISK-003"
    title: "False Positives in SAST"
    severity: "medium"
    status: "potential"
    description: "Semgrep/CodeQL may flag legitimate code patterns"
    mitigation: "Review and tune rules based on Tier 1 baseline scan results"
    impact: "Team time spent on triage; credibility of tool"

  - id: "RISK-004"
    title: "CI/CD Timeout Issues"
    severity: "low"
    status: "potential"
    description: "Scanning workflows may exceed GitHub Actions time limits"
    mitigation: "Profile scanning times; optimize if needed; use caching"
    impact: "CI/CD slowdown; potential merge delays"

