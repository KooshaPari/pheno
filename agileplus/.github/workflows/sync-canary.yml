name: Sync Canary

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: agileplus-sync-canary
  cancel-in-progress: false

jobs:
  sync-canary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "agileplus-bot"
          git config user.email "agileplus-bot@users.noreply.github.com"

      - name: Prepare local canary ref
        run: |
          git fetch origin canary:canary || git branch canary origin/canary

      - name: Sync canary from main
        run: cargo run -p agileplus-cli --locked -- branch:sync --source main --target canary

      - name: Push canary
        run: git push origin canary
