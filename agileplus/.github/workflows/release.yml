name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        required: true
        type: string
        description: "Release version"
      language:
        required: true
        type: string
        description: "Programming language"
      registry:
        required: true
        type: string
        description: "Package registry"
      channel:
        required: false
        type: string
        default: stable
        description: "Release channel (alpha, beta, canary, stable)"
      dry_run:
        required: false
        type: boolean
        default: false
        description: "Run without publishing"

permissions:
  contents: write

concurrency:
  group: agileplus-release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  gate-check:
    uses: ./.github/workflows/gate-check.yml
    with:
      language: ${{ inputs.language }}
      channel: ${{ inputs.channel }}
      risk_profile: high

  changelog:
    needs: gate-check
    uses: ./.github/workflows/changelog.yml
    with:
      version: ${{ inputs.version }}

  publish:
    needs: changelog
    uses: ./.github/workflows/publish.yml
    with:
      language: ${{ inputs.language }}
      registry: ${{ inputs.registry }}
      version: ${{ inputs.version }}
      channel: ${{ inputs.channel }}
      dry_run: ${{ inputs.dry_run }}
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
      CARGO_TOKEN: ${{ secrets.CARGO_TOKEN }}
