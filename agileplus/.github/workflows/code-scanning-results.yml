name: Code Scanning Results

on:
  workflow_run:
    workflows: ["SAST Quick Check", "SAST Full Analysis"]
    types: [completed]

permissions:
  contents: read
  security-events: read

jobs:
  check-results:
    name: Check Code Scanning Results
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Query Code Scanning API
        uses: actions/github-script@v7
        with:
          script: |
            const { data: alerts } = await github.rest.codeScanning.listAlertsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open'
            });

            const criticalAlerts = alerts.filter(a =>
              a.rule.severity === 'critical' || a.rule.severity === 'error'
            );

            console.log(`Total alerts: ${alerts.length}`);
            console.log(`Critical alerts: ${criticalAlerts.length}`);

            if (criticalAlerts.length > 0) {
              console.error('Critical security findings detected');
              criticalAlerts.forEach(alert => {
                console.error(`- ${alert.rule.id}: ${alert.rule.description}`);
              });
            }
