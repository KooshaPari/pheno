syntax = "proto3";

package agileplus.v1;

// Core service: Rust core ↔ Python MCP communication
service AgilePlusCore {
  // Feature operations
  rpc GetFeature(GetFeatureRequest) returns (Feature);
  rpc ListFeatures(ListFeaturesRequest) returns (ListFeaturesResponse);
  rpc GetFeatureState(GetFeatureStateRequest) returns (FeatureState);

  // Work package operations
  rpc ListWorkPackages(ListWorkPackagesRequest) returns (ListWorkPackagesResponse);
  rpc GetWorkPackageStatus(GetWPStatusRequest) returns (WorkPackageStatus);

  // Governance operations
  rpc CheckGovernanceGate(GovernanceGateRequest) returns (GovernanceGateResponse);
  rpc GetAuditTrail(GetAuditTrailRequest) returns (stream AuditEntry);
  rpc VerifyAuditChain(VerifyChainRequest) returns (VerifyChainResponse);

  // Command dispatch (MCP → Core)
  rpc DispatchCommand(CommandRequest) returns (CommandResponse);

  // Agent event streaming (Core → MCP, bidirectional)
  rpc AgentEvents(stream AgentEvent) returns (stream AgentEventAck);
}

// --- Feature ---

message GetFeatureRequest {
  string slug = 1;
}

message ListFeaturesRequest {
  string state_filter = 1; // optional, empty = all
}

message ListFeaturesResponse {
  repeated Feature features = 1;
}

message Feature {
  int64 id = 1;
  string slug = 2;
  string friendly_name = 3;
  string state = 4;
  string target_branch = 5;
  string created_at = 6;
  string updated_at = 7;
  int32 wp_count = 8;
  int32 wp_done = 9;
}

message GetFeatureStateRequest {
  string slug = 1;
}

message FeatureState {
  string state = 1;
  string next_command = 2;        // recommended next action
  repeated string blockers = 3;   // what's blocking progression
  GovernanceStatus governance = 4;
}

// --- Work Packages ---

message ListWorkPackagesRequest {
  string feature_slug = 1;
  string state_filter = 2; // optional
}

message ListWorkPackagesResponse {
  repeated WorkPackageStatus packages = 1;
}

message GetWPStatusRequest {
  string feature_slug = 1;
  int32 wp_sequence = 2;
}

message WorkPackageStatus {
  int64 id = 1;
  string title = 2;
  string state = 3;
  int32 sequence = 4;
  string agent_id = 5;
  string pr_url = 6;
  string pr_state = 7;
  repeated int32 depends_on = 8;
  repeated string file_scope = 9;
}

// --- Governance ---

message GovernanceGateRequest {
  string feature_slug = 1;
  string transition = 2; // e.g., "implementing → validated"
}

message GovernanceGateResponse {
  bool passed = 1;
  repeated GateViolation violations = 2;
}

message GateViolation {
  string fr_id = 1;
  string rule_id = 2;
  string message = 3;
  string remediation = 4;
}

message GovernanceStatus {
  bool all_gates_passed = 1;
  int32 total_rules = 2;
  int32 passed_rules = 3;
  repeated GateViolation outstanding = 4;
}

// --- Audit ---

message GetAuditTrailRequest {
  string feature_slug = 1;
  int64 after_id = 2; // pagination: entries after this ID
}

message AuditEntry {
  int64 id = 1;
  string feature_slug = 2;
  int32 wp_sequence = 3; // 0 if feature-level
  string timestamp = 4;
  string actor = 5;
  string transition = 6;
  repeated string evidence_refs = 7;
  bytes prev_hash = 8;
  bytes hash = 9;
}

message VerifyChainRequest {
  string feature_slug = 1;
}

message VerifyChainResponse {
  bool valid = 1;
  int64 entries_verified = 2;
  string first_invalid_id = 3; // empty if valid
  string error_message = 4;
}

// --- Commands ---

message CommandRequest {
  string command = 1;          // "specify", "research", "plan", etc.
  string feature_slug = 2;     // target feature
  map<string, string> args = 3; // command-specific arguments
}

message CommandResponse {
  bool success = 1;
  string message = 2;
  map<string, string> outputs = 3; // command-specific outputs (paths, etc.)
}

// --- Agent Events ---

message AgentEvent {
  string event_type = 1;  // "started", "progress", "pr_created", "review_received", "completed", "failed"
  string feature_slug = 2;
  int32 wp_sequence = 3;
  string agent_id = 4;
  string payload = 5;     // JSON, event-specific
  string timestamp = 6;
}

message AgentEventAck {
  string event_id = 1;
  bool acknowledged = 2;
  string instruction = 3; // optional follow-up instruction for agent
}
