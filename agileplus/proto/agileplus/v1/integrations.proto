syntax = "proto3";

package agileplus.v1;

option go_package = "github.com/phenotype/agileplus-proto/gen/go/agileplus/v1;agileplusv1";
option java_outer_classname = "IntegrationsProto";
option java_package = "com.phenotype.agileplus.v1";

// Integrations service: Plane.so sync, GitHub sync, triage/backlog.
// Implemented by agileplus-integrations. Called by agileplus-core (via gRPC).
service IntegrationsService {
  // Plane.so sync
  rpc SyncFeatureToPlane(SyncFeatureToPlaneRequest) returns (SyncFeatureToPlaneResponse);
  rpc SyncWPToPlane(SyncWPToPlaneRequest) returns (SyncWPToPlaneResponse);
  rpc DetectPlaneConflicts(DetectPlaneConflictsRequest) returns (DetectPlaneConflictsResponse);

  // GitHub sync
  rpc SyncBugToGitHub(SyncBugToGitHubRequest) returns (SyncBugToGitHubResponse);
  rpc SyncIssueStatus(SyncIssueStatusRequest) returns (SyncIssueStatusResponse);
  rpc DetectGitHubConflicts(DetectGitHubConflictsRequest) returns (DetectGitHubConflictsResponse);

  // Triage
  rpc ClassifyInput(ClassifyInputRequest) returns (ClassifyInputResponse);
  rpc CreateBacklogItem(CreateBacklogItemRequest) returns (CreateBacklogItemResponse);
  rpc ListBacklog(ListBacklogRequest) returns (ListBacklogResponse);
  rpc PromoteBacklogItem(PromoteBacklogItemRequest) returns (PromoteBacklogItemResponse);

  // Prompt router generation
  rpc GenerateRouter(GenerateRouterRequest) returns (GenerateRouterResponse);
}

// --- Sync ---

message SyncFeatureToPlaneRequest {
  string feature_slug = 1;
  string state = 2;
}

message SyncFeatureToPlaneResponse {
  bool success = 1;
  string mirror_id = 2;
  string mirror_url = 3;
  string message = 4;
}

message SyncWPToPlaneRequest {
  string feature_slug = 1;
  int32 wp_sequence = 2;
  string state = 3;
  string pr_url = 4;
}

message SyncWPToPlaneResponse {
  bool success = 1;
  string mirror_id = 2;
  string mirror_url = 3;
  string message = 4;
}

message SyncBugToGitHubRequest {
  string title = 1;
  string body = 2;
  repeated string labels = 3;
  string feature_slug = 4;
  int32 wp_sequence = 5;
}

message SyncBugToGitHubResponse {
  bool success = 1;
  string mirror_id = 2;
  string mirror_url = 3;
  string message = 4;
}

message SyncIssueStatusRequest {
  string mirror = 1;
  string mirror_id = 2;
}

message SyncIssueStatusResponse {
  bool success = 1;
  string mirror_id = 2;
  string mirror_url = 3;
  string message = 4;
}

message DetectPlaneConflictsRequest {
  string mirror = 1;
}

message DetectPlaneConflictsResponse {
  repeated Conflict conflicts = 1;
}

message DetectGitHubConflictsRequest {
  string mirror = 1;
}

message DetectGitHubConflictsResponse {
  repeated Conflict conflicts = 1;
}

message Conflict {
  string entity_type = 1;
  int64 entity_id = 2;
  string mirror_id = 3;
  string description = 4;
  string local_hash = 5;
  string remote_hash = 6;
}

// --- Triage ---

message ClassifyInputRequest {
  string input = 1;
  string feature_slug = 2;
  int32 wp_sequence = 3;
}

message ClassifyInputResponse {
  string type = 1;
  string confidence = 2;
  string suggested_title = 3;
  string suggested_priority = 4;
}

message CreateBacklogItemRequest {
  string type = 1;
  string title = 2;
  string body = 3;
  string priority = 4;
  string feature_id = 5;
  string wp_id = 6;
  string triaged_by = 7;
}

message CreateBacklogItemResponse {
  BacklogItem item = 1;
}

message BacklogItem {
  int64 id = 1;
  string type = 2;
  string title = 3;
  string body = 4;
  string priority = 5;
  string state = 6;
  string external_ref = 7;
  string created_at = 8;
}

message ListBacklogRequest {
  string type_filter = 1;
  string state_filter = 2;
  string feature_slug = 3;
}

message ListBacklogResponse {
  repeated BacklogItem items = 1;
}

message PromoteBacklogItemRequest {
  int64 backlog_item_id = 1;
  string target_type = 2;
}

message PromoteBacklogItemResponse {
  bool success = 1;
  string created_entity_id = 2;
  string message = 3;
}

// --- Prompt Router ---

message GenerateRouterRequest {
  string project_path = 1;
  repeated string sub_commands = 2;
}

message GenerateRouterResponse {
  bool success = 1;
  string claude_md_path = 2;
  string agents_md_path = 3;
  string message = 4;
}
