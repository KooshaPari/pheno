<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6" 
     x-data="{ 
       openMedia(src, title, type) {
         if (window.__AgilePlusLightbox) {
           window.__AgilePlusLightbox.show(src, title, type);
         }
       } 
     }">
{% for media in media_assets %}
  <article class="media-card group relative overflow-hidden bg-zinc-900 border border-zinc-700 rounded-lg hover:border-zinc-500 transition-all duration-200 shadow-lg hover:shadow-black/40">
    <div class="media-card-image-container aspect-video relative overflow-hidden">
      <button type="button"
              class="w-full h-full block group-hover:scale-105 transition-transform duration-300"
              data-media-url="{{ media.url_or_path }}"
              data-media-name="{{ media.name }}"
              data-media-type="{{ media.kind }}"
              onclick="window.__AgilePlusLightbox && window.__AgilePlusLightbox.show(this.dataset.mediaUrl, this.dataset.mediaName, this.dataset.mediaType)"
              aria-label="Open {{ media.name }}">
        {% if media.kind == "video" %}
          <div class="absolute inset-0 flex items-center justify-center bg-black/40 z-10 group-hover:bg-black/20 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 text-white/80 group-hover:text-white transition-all transform group-hover:scale-110" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
          </div>
        {% endif %}
        <img src="{{ media.url_or_path }}"
             alt="{{ media.name }}"
             class="w-full h-full object-cover"
             onerror="this.src='/static/placeholder.png'" />
        
        <!-- Hover Overlay: subtle dark vignette -->
        <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-black/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-200 pointer-events-none"></div>
        <!-- Bottom-right open button — only shown on hover -->
        <div class="absolute bottom-2 right-2 opacity-0 group-hover:opacity-100 transition-all duration-200 transform translate-y-1 group-hover:translate-y-0 pointer-events-none">
          <span class="flex items-center gap-1.5 px-2.5 py-1.5 bg-zinc-900/90 backdrop-blur border border-zinc-600 text-white text-[11px] font-semibold uppercase tracking-wider rounded shadow-lg">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 3h6m0 0v6m0-6L9 15M5 5H3a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-2" />
            </svg>
            Open
          </span>
        </div>
      </button>
    </div>
    
    <div class="p-4 bg-zinc-950/50 backdrop-blur-sm border-t border-zinc-800">
      <div class="flex items-start justify-between gap-2">
        <h3 class="text-sm font-bold text-zinc-100 truncate flex-1">{{ media.name }}</h3>
        <span class="px-1.5 py-0.5 bg-zinc-800 text-[10px] font-bold text-zinc-400 uppercase tracking-tighter rounded border border-zinc-700">
          {{ media.kind }}
        </span>
      </div>
      <div class="mt-1 flex items-center gap-2 text-[10px] text-zinc-500 font-medium">
        <span>Source: {{ media.source }}</span>
      </div>
      <p class="mt-2 text-[10px] font-mono text-zinc-500 truncate opacity-60 hover:opacity-100 transition-opacity">{{ media.url_or_path }}</p>
    </div>
  </article>
{% else %}
  <div class="col-span-full py-20 flex flex-col items-center justify-center border-2 border-dashed border-zinc-800 rounded-xl">
    <svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 text-zinc-700 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
    </svg>
    <p class="text-zinc-500 text-sm">No media assets found for this feature.</p>
  </div>
{% endfor %}
</div>
