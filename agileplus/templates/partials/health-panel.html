<div id="health-panel"
     hx-get="/api/dashboard/health"
     hx-trigger="every 10s"
     class="grid md:grid-cols-2 gap-3 p-2 md:p-4">
  {% for svc in services %}
    <div class="health-card bg-zinc-800 rounded p-4
      {%- if svc.healthy %} border border-green-700
      {%- else if svc.degraded %} border border-zinc-600
      {%- else %} border border-red-700
      {%- endif %}">
      <div class="flex items-center justify-between">
        <h3 class="font-mono font-bold text-sm">{{ svc.name }}</h3>
        <span class="w-3 h-3 rounded-full
          {%- if svc.healthy %} bg-green-500
          {%- else if svc.degraded %} bg-yellow-400
          {%- else %} bg-red-500
          {%- endif %}"></span>
      </div>
      <div class="text-xs text-zinc-400 mt-2 space-y-0.5">
        <div>Status:
          {%- if svc.healthy %} healthy
          {%- else if svc.degraded %} degraded
          {%- else %} unavailable
          {%- endif %}
        </div>
        {% if let Some(lat) = svc.latency_ms %}
          <div>Latency: {{ lat }}ms</div>
        {% endif %}
        <div>Last check: just now</div>
      </div>
    </div>
  {% endfor %}
</div>
