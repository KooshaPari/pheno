<div id="project-switcher" class="mb-4">
  <label class="block text-xs font-medium text-zinc-400 mb-1">Project</label>
  <select
    class="w-full max-w-xs rounded-md border border-zinc-700 bg-zinc-800 px-3 py-2 text-sm text-zinc-200 truncate focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
    onchange="htmx.ajax('POST', '/api/dashboard/projects/' + this.value + '/activate', {target:'#kanban-board', swap:'outerHTML'})">
    <option value="0" {% if active_id.is_none() %}selected{% endif %}>All Projects</option>
    {% for p in projects %}
      <option value="{{ p.id }}" {% if active_id.is_some() && active_id.unwrap() == p.id %}selected{% endif %}>{{ p.name }}</option>
    {% endfor %}
  </select>
</div>
