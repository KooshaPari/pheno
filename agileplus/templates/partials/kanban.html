<div id="kanban-board"
     hx-get="/api/dashboard/kanban"
     hx-trigger="sse:feature_updated"
     hx-swap="outerHTML"
     x-data="kanbanBoard()"
     class="flex flex-col md:flex-row gap-4 p-2 md:p-4 overflow-x-auto">
  {% for (state, col_cards) in cards %}
    <div class="kanban-column min-w-[20rem] bg-zinc-800 rounded border border-zinc-700 flex-shrink-0"
         :class="dragOverCol === '{{ state }}' ? 'kanban-column-drag-over' : ''"
         @dragover="onDragOver($event, '{{ state }}')"
         @dragleave="onDragLeave()"
         @drop="onDrop($event, '{{ state }}')">
      <h3 class="px-4 py-2 font-mono font-bold border-b border-zinc-700 capitalize text-sm">
        {{ state }} ({{ col_cards.len() }})
      </h3>
      <div class="p-2 space-y-2 min-h-[8rem] max-h-[calc(100vh-12rem)] overflow-y-auto" data-state="{{ state }}">
        {% for feature in col_cards %}
          {% include "partials/feature-card.html" %}
        {% endfor %}
      </div>
    </div>
  {% endfor %}
</div>
