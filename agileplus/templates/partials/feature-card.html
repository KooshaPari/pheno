<div class="feature-card bg-zinc-900 border border-zinc-700 rounded p-3 cursor-pointer hover:border-zinc-500 transition min-w-0"
     data-feature-id="{{ feature.id }}"
     draggable="true"
     @dragstart="onDragStart($event, {{ feature.id }})"
     :class="draggingId == {{ feature.id }} ? 'kanban-card-dragging' : ''">
  <a href="/api/dashboard/features/{{ feature.id }}"
     class="block font-medium text-sm text-zinc-100 hover:text-white truncate">
    {{ feature.title }}
  </a>
  <div class="flex flex-wrap gap-1 mt-2">
    <span class="badge badge-{{ feature.state }} text-xs px-1 py-0.5 rounded border border-zinc-600 capitalize">
      {{ feature.state }}
    </span>
    {% for label in feature.labels %}
      <span class="text-[9px] font-bold uppercase px-1 py-0.5 rounded border {{ crate::templates::label_color(label) }}">
        {{ label }}
      </span>
    {% endfor %}
  </div>
  <!-- T080: State transition button on card -->
  <div class="mt-2 flex gap-1 flex-wrap">
    <button
      hx-post="/api/features/{{ feature.id }}/transition"
      hx-vals='{"target_state":"implementing"}'
      hx-confirm="Transition to Implementing?"
      hx-target="#kanban-board"
      hx-swap="outerHTML"
      class="transition-btn text-xs px-2 py-0.5 rounded border border-blue-600 text-blue-400 hover:bg-blue-700 hover:text-white transition">
      → Implement
    </button>
    <button
      hx-post="/api/features/{{ feature.id }}/transition"
      hx-vals='{"target_state":"shipped"}'
      hx-confirm="Mark as Shipped?"
      hx-target="#kanban-board"
      hx-swap="outerHTML"
      class="transition-btn text-xs px-2 py-0.5 rounded border border-zinc-600 text-zinc-400 hover:bg-zinc-700 hover:text-white transition">
      → Ship
    </button>
  </div>
</div>
