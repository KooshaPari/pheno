{% if success %}
  <div class="fixed bottom-4 right-4 bg-green-900 border border-green-700 text-green-100 px-4 py-3 rounded shadow-lg z-50" role="alert">
    <p class="text-sm">{{ message }}</p>
  </div>
{% else %}
  <div class="fixed bottom-4 right-4 bg-red-900 border border-red-700 text-red-100 px-4 py-3 rounded shadow-lg z-50" role="alert">
    <p class="text-sm">{{ message }}</p>
  </div>
{% endif %}

<script>
  setTimeout(() => {
    const toast = document.querySelector('[role="alert"]');
    if (toast) {
      toast.style.transition = 'opacity 0.3s ease-out';
      toast.style.opacity = '0';
      setTimeout(() => toast.remove(), 300);
    }
  }, 3000);
</script>
