{% extends "base.html" %}

{% block title %}Events{% endblock %}

{% block content %}
<div class="space-y-6 max-w-5xl mx-auto">
  <div class="border-b border-zinc-700 pb-4">
    <h1 class="text-2xl font-bold tracking-tight">Activity Feed</h1>
    <p class="text-sm text-zinc-400 mt-1">Unified operational timeline across AgilePlus and Plane sync events.</p>
  </div>

  <div class="space-y-3">
    {% for event in events %}
      <div class="rounded border border-zinc-700 bg-zinc-800 px-4 py-3">
        <div class="flex items-center justify-between gap-4">
          <div class="text-sm font-semibold text-zinc-100 min-w-0 flex-1">{{ event.description }}</div>
          <div class="text-xs text-zinc-500 flex-shrink-0">{{ event.timestamp }}</div>
        </div>
        <div class="text-xs text-zinc-400 mt-2 uppercase tracking-wide">{{ event.kind }}</div>
      </div>
    {% endfor %}
  </div>
</div>
{% endblock %}
