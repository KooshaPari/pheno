# Phase 0: Multi-Tool Code Review Infrastructure Configuration
# Master configuration for consensus thresholds, merge gates, rate limits, and tool weights

[consensus]
# Minimum approval percentage required for automated merge decisions
approval_threshold = 0.70  # 70% of reviewers must approve
critical_threshold = 0.85  # 85% for critical/security changes
hotfix_threshold = 0.50    # 50% for urgent hotfixes

[merge_gates]
# Merge conditions and blocking requirements
require_all_checks_pass = true
require_approval = true
require_ci_green = true
require_security_scan = true
allow_stale_reviews = false
dismiss_stale_reviews_on_push = true

# File patterns that require additional scrutiny
critical_patterns = [
  "**/Cargo.toml",
  "*.lock",
  "crates/phenotype-*/src/**",
  ".github/workflows/**",
  "review.toml",
  ".coderabbit.yaml",
]

# Changes that bypass normal thresholds (manual override required)
force_approve_patterns = [
  "docs/**",
  "*.md",
]

[rate_limits]
# API rate limiting and concurrent operations
max_concurrent_reviews = 10
reviews_per_minute = 5
check_runs_per_minute = 3
comment_burst_limit = 2
backoff_multiplier = 1.5  # Exponential backoff

[tool_weights]
# Relative influence of each review tool in consensus
coderabbit = 0.40
cargo_audit = 0.25
codeql = 0.20
gitguardian = 0.10
custom_checks = 0.05

[tool_timeouts]
# Maximum time (seconds) to wait for each tool
coderabbit = 300
cargo_audit = 180
codeql = 300
gitguardian = 120
custom_checks = 60

[auto_merge]
# Automated merge conditions
enabled = true
min_reviews_required = 2
auto_squash = true
delete_branch_on_merge = true

# Only auto-merge if all of these are met
conditions = [
  "all_checks_pass",
  "approval_threshold_met",
  "no_conflicts",
  "branch_up_to_date",
  "no_ci_failures",
]

[slack_notifications]
# Slack integration for reviews and merges
enabled = false  # Set to true when Slack workspace is configured
channel = "#code-reviews"
notify_on_approval = false
notify_on_merge = true
notify_on_failure = true

[github_integration]
# GitHub-specific configuration
branch_protection_update = true
enforce_admin_rules = true
require_status_checks = [
  "CodeQL (rust)",
  "Cargo Audit",
  "Cargo Deny",
  "Gitleaks",
  "OSV Scanner",
]

[logging]
# Audit trail and logging configuration
enable_audit_log = true
log_file = "logs/review-audit.jsonl"
log_level = "info"
retention_days = 90
