[package]
name = "phenotype-contracts"
version = "0.1.0"
edition = "2021"
description = "Hexagonal architecture ports and contracts for phenotype-infrakit"
license = "Apache-2.0"
repository = "https://github.com/phenotype/phenotype-infrakit"
keywords = ["hexagonal", "ports", "adapters", "architecture"]
categories = ["architecture"]

[dependencies]
thiserror = "2.0"
async-trait = "0.1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.0", features = ["sync", "time"] }
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.11", features = ["v4", "serde"] }

[dev-dependencies]
tokio = { version = "1.0", features = ["full"] }
