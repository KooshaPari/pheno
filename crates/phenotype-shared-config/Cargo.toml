[package]
name = "phenotype-shared-config"
version = "0.2.0"
edition = "2021"
license = "MIT"
description = "Shared configuration types and utilities for Phenotype crates"

[lib]
path = "src/lib.rs"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1"
thiserror = "2.0"
dirs = "5"
toml = { version = "0.8", optional = true }
serde_yaml = { version = "0.9", optional = true }

[dev-dependencies]
tokio = { version = "1", features = ["full"] }

[features]
default = ["toml", "yaml"]
yaml = ["dep:serde_yaml"]
toml = ["dep:toml"]
