name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --manifest-path libs/nexus/Cargo.toml
      - run: cargo clippy --manifest-path libs/nexus/Cargo.toml -- -D warnings
