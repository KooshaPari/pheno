# Code Review Routing Matrix
# Maps file patterns to assigned review tools and custom checks
# Phase 0 configuration

version: "1.0"
description: "File pattern routing for multi-tool code review infrastructure"

routes:
  # Cargo configuration files - require security scanning
  cargo_manifests:
    patterns:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
    tools:
      - cargo_audit
      - cargo_deny
      - osv_scanner
    required: true
    priority: "critical"
    notify_security_team: true

  # Rust source code - comprehensive analysis
  rust_source:
    patterns:
      - "**/*.rs"
      - "!**/test*.rs"
      - "!**/*_test.rs"
    tools:
      - codeql
      - coderabbit
      - clippy_check
      - custom_complexity_check
    required: true
    priority: "high"

  # Rust tests
  rust_tests:
    patterns:
      - "**/test*.rs"
      - "**/*_test.rs"
      - "tests/**/*.rs"
    tools:
      - coderabbit
      - custom_test_coverage_check
    required: false
    priority: "medium"

  # GitHub workflows - security critical
  github_workflows:
    patterns:
      - ".github/workflows/**/*.yml"
      - ".github/workflows/**/*.yaml"
    tools:
      - gitguardian
      - coderabbit
      - custom_workflow_validator
    required: true
    priority: "critical"
    human_review_required: true

  # CI/CD configurations
  ci_configurations:
    patterns:
      - ".github/**/*.yml"
      - ".github/**/*.yaml"
      - "*.toml"
      - ".pre-commit-config.yaml"
    tools:
      - coderabbit
      - gitguardian
    required: true
    priority: "high"

  # Documentation
  documentation:
    patterns:
      - "**/*.md"
      - "docs/**"
      - "README.md"
      - "CHANGELOG.md"
    tools:
      - coderabbit
    required: false
    priority: "low"
    allow_auto_merge: true

  # Configuration files
  config_files:
    patterns:
      - "review.toml"
      - ".coderabbit.yaml"
      - "routing-matrix.yaml"
      - "*.config.toml"
    tools:
      - coderabbit
      - gitguardian
    required: true
    priority: "high"
    human_review_required: true

  # Dependency files
  dependencies:
    patterns:
      - "Cargo.toml"
      - "Cargo.lock"
      - "package.json"
      - "package-lock.json"
      - "pyproject.toml"
      - "requirements*.txt"
    tools:
      - osv_scanner
      - cargo_audit
      - cargo_deny
      - gitguardian
    required: true
    priority: "critical"

  # Python source
  python_source:
    patterns:
      - "**/*.py"
      - "!**/test_*.py"
      - "!**/tests/**"
    tools:
      - coderabbit
      - gitguardian
    required: true
    priority: "high"

  # Archive and legacy
  archived_code:
    patterns:
      - ".archive/**"
      - "archived/**"
    tools: []
    required: false
    priority: "low"
    allow_auto_merge: true

# Tool definitions
tools:
  coderabbit:
    type: "ai_review"
    timeout_seconds: 300
    weight: 0.40
    required_for: ["rust_source", "cargo_manifests", "ci_configurations"]

  cargo_audit:
    type: "security_scanner"
    timeout_seconds: 180
    weight: 0.25
    required_for: ["cargo_manifests", "dependencies"]

  codeql:
    type: "static_analysis"
    timeout_seconds: 300
    weight: 0.20
    required_for: ["rust_source"]

  gitguardian:
    type: "secret_scanner"
    timeout_seconds: 120
    weight: 0.10
    required_for: ["github_workflows", "ci_configurations", "dependencies"]

  osv_scanner:
    type: "vulnerability_scanner"
    timeout_seconds: 240
    weight: 0.15
    required_for: ["cargo_manifests", "dependencies"]

  cargo_deny:
    type: "dependency_checker"
    timeout_seconds: 120
    weight: 0.05
    required_for: ["cargo_manifests"]

  clippy_check:
    type: "lint"
    timeout_seconds: 120
    weight: 0.10
    required_for: ["rust_source"]

  custom_complexity_check:
    type: "custom"
    timeout_seconds: 60
    weight: 0.05
    script: "scripts/check_complexity.sh"

  custom_test_coverage_check:
    type: "custom"
    timeout_seconds: 120
    weight: 0.10
    script: "scripts/check_coverage.sh"

  custom_workflow_validator:
    type: "custom"
    timeout_seconds: 60
    weight: 0.10
    script: "scripts/validate_workflows.sh"

# Merge rules
merge_rules:
  # Default rule for all PRs
  default:
    min_approvals: 1
    auto_merge_enabled: false
    require_all_checks: true
    require_status_checks: true

  # Critical changes require more scrutiny
  critical:
    min_approvals: 2
    auto_merge_enabled: false
    require_all_checks: true
    require_human_review: true
    status_checks:
      - "CodeQL (rust)"
      - "Cargo Audit"
      - "Cargo Deny"

  # Documentation can be auto-merged
  documentation_only:
    min_approvals: 1
    auto_merge_enabled: true
    require_all_checks: false
    auto_delete_branch: true

  # Hotfix fast-track
  hotfix:
    min_approvals: 1
    auto_merge_enabled: true
    priority: "urgent"
    notification_required: true

# Notification settings
notifications:
  channels:
    slack:
      enabled: false
      webhook_url: "${SLACK_WEBHOOK_URL}"
      mention_on_failure: ["@platform-team"]

    github:
      enabled: true
      post_review_comments: true
      dismiss_stale_reviews: true

# Escalation rules
escalation:
  timeout_minutes: 60
  escalate_to: ["@code-review-team"]
  auto_escalate_on_conflicts: true
