name: 'Run Tests'
description: 'Run Rust tests with optional linting using rustfmt and clippy'

inputs:
  test-command:
    description: 'Cargo test command to run'
    required: false
    default: 'cargo test --all'
  lint-command:
    description: 'Clippy command to run'
    required: false
    default: 'cargo clippy -- -D warnings'
  skip-lint:
    description: 'Skip linting step'
    required: false
    default: 'false'
  format-check:
    description: 'Run cargo fmt --check'
    required: false
    default: 'true'
  working-directory:
    description: 'Working directory for commands'
    required: false
    default: '.'

runs:
  using: composite
  steps:
    - name: Format check
      if: inputs.format-check == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: cargo fmt --all -- --check

    - name: Clippy lint
      if: inputs.skip-lint != 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: ${{ inputs.lint-command }}

    - name: Build
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: cargo build

    - name: Test
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: ${{ inputs.test-command }}
