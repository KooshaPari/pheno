name: 'Setup Environment'
description: 'Checkout code, setup Rust toolchain, cache dependencies, and optionally install protoc'

inputs:
  rust-version:
    description: 'Rust toolchain version to install'
    required: false
    default: 'stable'
  setup-protoc:
    description: 'Install protoc compiler'
    required: false
    default: 'false'
  checkout-depth:
    description: 'Fetch depth for checkout (0 = full history)'
    required: false
    default: '1'
  rust-components:
    description: 'Comma-separated list of Rust components to install (e.g., rustfmt,clippy)'
    required: false
    default: ''
  workspace:
    description: 'Cargo workspace path for caching'
    required: false
    default: '.'

runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: ${{ inputs.checkout-depth }}

    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@${{ inputs.rust-version }}
      with:
        components: ${{ inputs.rust-components }}

    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: ${{ inputs.workspace }}

    - name: Setup protoc
      if: inputs.setup-protoc == 'true'
      uses: arduino/setup-protoc@v3
      with:
        version: "28.x"
        repo-token: ${{ github.token }}
