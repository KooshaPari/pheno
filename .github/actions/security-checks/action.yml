name: 'Security Checks'
description: 'Run security scanning tools: cargo-audit, cargo-deny, trufflehog, and Python bandit'

inputs:
  cargo-audit:
    description: 'Run cargo-audit for Rust dependency vulnerabilities'
    required: false
    default: 'true'
  cargo-deny:
    description: 'Run cargo-deny for license/advisory/duplicate checking'
    required: false
    default: 'true'
  trufflehog:
    description: 'Run trufflehog for secret detection in git history'
    required: false
    default: 'true'
  python-bandit:
    description: 'Run bandit for Python security linting'
    required: false
    default: 'false'
  cargo-deny-config:
    description: 'Path to cargo-deny configuration file'
    required: false
    default: 'deny.toml'
  bandit-path:
    description: 'Path to Python source for bandit scanning'
    required: false
    default: '.'
  working-directory:
    description: 'Working directory for Rust projects'
    required: false
    default: '.'
  checkout-depth:
    description: 'Fetch depth (0 required for trufflehog full history)'
    required: false
    default: '1'

runs:
  using: composite
  steps:
    - name: Cargo Audit
      if: inputs.cargo-audit == 'true'
      uses: rustsec/audit-check@v2.0.0
      with:
        token: ${{ github.token }}

    - name: Install cargo-deny
      if: inputs.cargo-deny == 'true'
      shell: bash
      run: cargo install cargo-deny

    - name: Cargo Deny Check
      if: inputs.cargo-deny == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        if [ -f "${{ inputs.cargo-deny-config }}" ]; then
          cargo deny check -c ${{ inputs.cargo-deny-config }}
        else
          cargo deny check
        fi

    - name: Secrets scan (trufflehog)
      if: inputs.trufflehog == 'true'
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: ${{ github.event.repository.default_branch }}
        extra_args: --only-verified
    - name: Setup Python for bandit
      if: inputs.python-bandit == 'true'
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install bandit
      if: inputs.python-bandit == 'true'
      shell: bash
      run: pip install bandit[toml]

    - name: Run bandit
      if: inputs.python-bandit == 'true'
      shell: bash
      run: bandit -r ${{ inputs.bandit-path }} -ll
      continue-on-error: true
