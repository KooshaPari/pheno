name: 'Build Rust Binary'
description: 'Build Rust binary with optional cross-compilation and artifact upload'

inputs:
  target:
    description: 'Target triple for cross-compilation (e.g., x86_64-unknown-linux-gnu)'
    required: true
  use-cross:
    description: 'Use cross for cross-compilation'
    required: false
    default: 'false'
  binary-name:
    description: 'Name of the binary to build'
    required: false
    default: 'agileplus'
  artifact-name:
    description: 'Name for the uploaded artifact (auto-generated if not specified)'
    required: false
    default: ''
  strip-binary:
    description: 'Strip debug symbols from binary'
    required: false
    default: 'true'
  working-directory:
    description: 'Working directory for build'
    required: false
    default: '.'
  release:
    description: 'Build in release mode'
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - name: Install cross
      if: inputs.use-cross == 'true'
      shell: bash
      run: cargo install cross --git https://github.com/cross-rs/cross

    - name: Build binary (native)
      if: inputs.use-cross != 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        if [ "${{ inputs.release }}" == "true" ]; then
          cargo build --release
        else
          cargo build
        fi

    - name: Build binary (cross)
      if: inputs.use-cross == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        if [ "${{ inputs.release }}" == "true" ]; then
          cross build --target ${{ inputs.target }} --release
        else
          cross build --target ${{ inputs.target }}
        fi

    - name: Strip binary
      if: inputs.strip-binary == 'true' && inputs.use-cross != 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        if [ "${{ inputs.release }}" == "true" ]; then
          strip target/release/${{ inputs.binary-name }} || true
        else
          strip target/debug/${{ inputs.binary-name }} || true
        fi

    - name: Set artifact name
      id: artifact
      shell: bash
      run: |
        if [ -n "${{ inputs.artifact-name }}" ]; then
          echo "name=${{ inputs.artifact-name }}" >> $GITHUB_OUTPUT
        else
          echo "name=${{ inputs.binary-name }}-${{ inputs.target }}" >> $GITHUB_OUTPUT
        fi

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.artifact.outputs.name }}
        path: |
          ${{ inputs.working-directory }}/target/${{ inputs.release == 'true' && 'release' || 'debug' }}/${{ inputs.binary-name }}
