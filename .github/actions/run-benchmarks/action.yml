name: 'Run Benchmarks'
description: 'Run Criterion benchmarks and capture results'

inputs:
  benchmark-dir:
    description: 'Directory containing benchmark files'
    required: false
    default: 'benches'
  tool:
    description: 'Benchmark tool to use (currently only cargo)'
    required: false
    default: 'cargo'
  output-file:
    description: 'Path to save benchmark output'
    required: false
    default: 'target/criterion/output.txt'
  working-directory:
    description: 'Working directory for benchmarks'
    required: false
    default: '.'
  save-artifact:
    description: 'Upload benchmark results as artifact'
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - name: Check benchmark directory exists
      id: check-benches
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        if [ -d "${{ inputs.benchmark-dir }}" ] || find . -name "*bench*" -type f | grep -q .; then
          echo "has_benchmarks=true" >> $GITHUB_OUTPUT
        else
          echo "has_benchmarks=false" >> $GITHUB_OUTPUT
          echo "::warning::No benchmarks found in ${{ inputs.benchmark-dir }}"
        fi

    - name: Install Rust nightly (for benchmarks)
      if: steps.check-benches.outputs.has_benchmarks == 'true'
      uses: dtolnay/rust-toolchain@nightly

    - name: Run Criterion benchmarks
      if: steps.check-benches.outputs.has_benchmarks == 'true' && inputs.tool == 'cargo'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        mkdir -p $(dirname ${{ inputs.output-file }})
        cargo bench --no-fail-fast 2>&1 | tee ${{ inputs.output-file }}

    - name: Upload benchmark results
      if: steps.check-benches.outputs.has_benchmarks == 'true' && inputs.save-artifact == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-results
        path: ${{ inputs.working-directory }}/${{ inputs.output-file }}
        if-no-files-found: ignore
