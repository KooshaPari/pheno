name: Sync Canary

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: agileplus-sync-canary
  cancel-in-progress: false

jobs:
  sync-canary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "agileplus-bot"
          git config user.email "agileplus-bot@users.noreply.github.com"

      - name: Prepare local canary ref
        run: |
          git fetch origin main
          if git ls-remote --exit-code --heads origin canary; then
            git fetch origin canary:canary
            git switch canary
            git merge --ff-only origin/main
          else
            git switch -c canary origin/main
          fi

      - name: Sync canary from main
        run: git status --short --branch

      - name: Push canary
        run: git push origin canary:canary
