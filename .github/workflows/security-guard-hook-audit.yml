name: Security Guard (Hooks)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  guard:
    uses: KooshaPari/phenoShared/.github/workflows/security-guard-hook-audit.yml@main
