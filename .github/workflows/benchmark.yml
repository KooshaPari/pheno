name: Benchmarks

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: benchmark-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─── Cargo Bench ──────────────────────────────────────────────────────
  benchmark:
    name: Cargo Bench
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - uses: arduino/setup-protoc@v3
        with:
          version: "28.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Check for benches directory
        id: check-benches
        run: |
          if [ -d "rust/benches" ] || [ -d "benches" ]; then
            echo "has-benches=true" >> $GITHUB_OUTPUT
          else
            echo "has-benches=false" >> $GITHUB_OUTPUT
          fi
      - name: Run benchmarks
        if: steps.check-benches.outputs.has-benches == 'true'
        run: cargo bench --all --no-run
        continue-on-error: true
      - name: Store benchmark results
        if: steps.check-benches.outputs.has-benches == 'true'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: 'cargo'
          output-file-path: target/criterion/output.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
        continue-on-error: true