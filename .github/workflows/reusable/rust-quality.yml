name: Rust Quality Gate

on:
  workflow_call:
    inputs:
      rust-version:
        description: 'Rust toolchain version'
        required: false
        default: 'stable'
        type: string
      workspace:
        description: 'Cargo workspace path'
        required: false
        default: '.'
        type: string
      setup-protoc:
        description: 'Install protoc compiler'
        required: false
        default: false
        type: boolean
      coverage-threshold:
        description: 'Minimum coverage percentage'
        required: false
        default: 85
        type: number
      test-command:
        description: 'Test command to run'
        required: false
        default: 'cargo test --workspace'
        type: string

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-env
        with:
          rust-version: ${{ inputs.rust-version }}
          rust-components: rustfmt,clippy
          setup-protoc: ${{ inputs.setup-protoc }}
          workspace: ${{ inputs.workspace }}

      - uses: ./.github/actions/run-tests
        with:
          test-command: ${{ inputs.test-command }}
          lint-command: cargo clippy --workspace -- -D warnings
          format-check: 'true'
          working-directory: ${{ inputs.workspace }}

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-env
        with:
          rust-version: nightly
          setup-protoc: ${{ inputs.setup-protoc }}
          workspace: ${{ inputs.workspace }}

      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Generate coverage
        working-directory: ${{ inputs.workspace }}
        run: cargo tarpaulin --workspace --out xml --output-dir coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ${{ inputs.workspace }}/coverage/cobertura.xml
          flags: rust
          fail_ci_if_error: false

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: ./.github/actions/setup-env
        with:
          rust-version: stable
          workspace: ${{ inputs.workspace }}

      - uses: ./.github/actions/security-checks
        with:
          cargo-audit: 'true'
          cargo-deny: 'true'
          trufflehog: 'false'
          python-bandit: 'false'
          working-directory: ${{ inputs.workspace }}
