name: Cross-Project Testing Orchestration

on:
  workflow_dispatch:
    inputs:
      projects:
        description: 'Projects to test'
        required: true
        default: 'nanovms,agileplus,thegent'
        type: string
  schedule:
    - cron: '0 5 * * 0'  # Weekly cross-project

jobs:
  orchestration:
    name: Test Orchestration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read Test Config
        run: cat .mcp-testing.yaml | head -30

  nanovms:
    name: NanoVMS Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nanovms
    steps:
      - uses: actions/checkout@v4
        with:
          repository: KooshaPari/nanovms
          path: nanovms

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Run Tests (Bun + Cargo)
        run: |
          echo "NanoVMS: Vitest + Playwright + Cargo"
          bun add -d vitest @playwright/test
          bunx playwright install --with-deps
          bun run vitest run || true
          bun run playwright test || true
          cargo test --workspace || true

  agileplus:
    name: AgilePlus Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: AgilePlus
    steps:
      - uses: actions/checkout@v4
        with:
          repository: KooshaPari/AgilePlus
          path: AgilePlus

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Run Tests (Bun)
        run: |
          echo "AgilePlus: Vitest + Playwright + Cucumber"
          bun add -d vitest @playwright/test @cucumber/cucumber
          bunx playwright install --with-deps
          bun run vitest run || true
          bun run playwright test || true

  thegent:
    name: thegent Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: thegent
    steps:
      - uses: actions/checkout@v4
        with:
          repository: KooshaPari/thegent
          path: thegent

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Run Tests (Bun + uv)
        run: |
          echo "thegent: Vitest + Playwright + pytest"
          bun add -d vitest @playwright/test
          bunx playwright install --with-deps
          uv pip install pytest pytest-cov --system
          bun run vitest run || true
          pytest tests/ -v || true
          bun run playwright test || true

  aggregate-results:
    name: Aggregate Results
    runs-on: ubuntu-latest
    needs: [nanovms, agileplus, thegent]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## Cross-Project Testing Summary"
          echo ""
          echo "| Project | Status |"
          echo "|---------|--------|"
          echo "| NanoVMS | ${{ needs.nanovms.result == 'success' && '✅' || '❌' }} |"
          echo "| AgilePlus | ${{ needs.agileplus.result == 'success' && '✅' || '❌' }} |"
          echo "| thegent | ${{ needs.thegent.result == 'success' && '✅' || '❌' }} |"
