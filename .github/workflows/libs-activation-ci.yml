name: CI - libs activation
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    paths:
      - 'libs/**'
  pull_request:
    paths:
      - 'libs/**'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.1.1
      - uses: dtolnay/rust-toolchain@stable
      - name: Build phenotype-auth
        working-directory: libs/phenotype-auth
        run: |
          cargo build --release
      - name: Build phenotype-observability
        working-directory: libs/phenotype-observability
        run: |
          cargo build --release
      - name: Smoke test example builds
        run: |
          cargo build --manifest-path=libs/phenotype-auth/Cargo.toml --examples
          cargo build --manifest-path=libs/phenotype-observability/Cargo.toml --examples
          cargo build --manifest-path=crates/phenotype-cache-adapter/Cargo.toml --example usage