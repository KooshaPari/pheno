name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        required: true
        type: string
        description: "Release version"
      language:
        required: true
        type: string
        description: "Programming language"
      registry:
        required: true
        type: string
        description: "Package registry"
      channel:
        required: false
        type: string
        default: stable
        description: "Release channel (alpha, beta, canary, stable)"
      dry_run:
        required: false
        type: boolean
        default: false
        description: "Run without publishing"

permissions:
  contents: write

concurrency:
  group: agileplus-release-${{ inputs.version }}
  cancel-in-progress: false

