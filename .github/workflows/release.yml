name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g., 0.1.0)"
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build-release:
    name: Build Release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: false
          - target: x86_64-apple-darwin
            os: ubuntu-latest
            use_cross: true
          - target: aarch64-apple-darwin
            os: ubuntu-latest
            use_cross: true
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: arduino/setup-protoc@v3
        with:
          version: "28.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross
      - name: Build release binary
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
      - name: Strip binary
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            strip target/${{ matrix.target }}/release/agileplus || true
          fi
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agileplus-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/agileplus

  cyclonedx-sboms:
    name: CycloneDX SBOMs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-cyclonedx
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-cyclonedx@0.5.9
      - name: Generate workspace SBOMs
        run: bash scripts/ci/generate-workspace-sboms.sh . sbom-out
      - name: Upload SBOM bundle
        uses: actions/upload-artifact@v4
        with:
          name: cyclonedx-sbom-workspace
          path: sbom-out/cyclonedx-sbom-*.json
          if-no-files-found: error
          retention-days: 5

  syft-spdx:
    name: Syft SPDX (workspace)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Syft
        env:
          SYFT_SEMVER: 1.42.3
        run: |
          curl -fsSL "https://github.com/anchore/syft/releases/download/v${SYFT_SEMVER}/syft_${SYFT_SEMVER}_linux_amd64.tar.gz" | tar xz
          sudo install -m 0755 syft /usr/local/bin/syft
      - name: Generate SPDX JSON (repo tree)
        run: |
          mkdir -p sbom-out
          syft . \
            -o spdx-json=sbom-out/syft-spdx-workspace.json \
            --exclude './target/**' \
            --exclude './docs/**' \
            --exclude './**/.venv/**' \
            --exclude './**/node_modules/**' \
            --exclude './.git/**'
      - name: Upload SPDX artifact
        uses: actions/upload-artifact@v4
        with:
          name: syft-spdx-workspace
          path: sbom-out/syft-spdx-workspace.json
          if-no-files-found: error
          retention-days: 5

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-release
      - cyclonedx-sboms
      - syft-spdx
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./binaries
      - name: Prepare release assets
        run: |
          mkdir -p ./release-assets
          for target_dir in ./binaries/*/; do
            target_name=$(basename "$target_dir")
            binary_path="$target_dir/agileplus"
            if [ -f "$binary_path" ]; then
              cp "$binary_path" "./release-assets/agileplus-${target_name}"
            fi
          done
          sbom_dir="./binaries/cyclonedx-sbom-workspace"
          if [ -d "$sbom_dir" ]; then
            shopt -s nullglob
            for f in "$sbom_dir"/cyclonedx-sbom-*.json; do
              cp "$f" ./release-assets/
            done
            shopt -u nullglob
          fi
          syft_dir="./binaries/syft-spdx-workspace"
          if [ -d "$syft_dir" ]; then
            for f in "$syft_dir"/*.json; do
              [ -f "$f" ] && cp "$f" ./release-assets/
            done
          fi
      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "./release-assets/*"
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false
          generateReleaseNotes: true
          allowUpdates: true
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
