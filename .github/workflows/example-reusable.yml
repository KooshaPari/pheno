name: Example - Using Reusable Workflows

# This is an example workflow demonstrating how to use the reusable workflows
# defined in .github/workflows/reusable/

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  # Example 1: Use the Rust quality gate
  quality:
    uses: ./.github/workflows/reusable/rust-quality.yml
    with:
      rust-version: stable
      workspace: .
      setup-protoc: true
      coverage-threshold: 85
      test-command: cargo test --workspace

  # Example 2: Use the security scan workflow
  security:
    uses: ./.github/workflows/reusable/security-scan.yml
    with:
      workspace: .
      cargo-audit: true
      cargo-deny: true
      gitleaks: true
      python-bandit: false

  # Example 3: Build release binaries (only on tags)
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    uses: ./.github/workflows/reusable/rust-release.yml
    with:
      binary-name: myapp
      rust-version: stable
      setup-protoc: true
      strip-binary: true
    secrets:
      inherit