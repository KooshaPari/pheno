# VitePress docs: build + Node tests + Playwright smoke.
# Note: GitHub Actions may fail on account billing; run `task docs:check` locally.
name: Docs

on:
  push:
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vitepress:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.1.1

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        run: bunx playwright install chromium --with-deps

      - name: Docs check (build + tests + e2e)
        run: bun run docs:check
