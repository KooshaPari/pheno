name: VitePress Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
jobs:
  deploy:
    uses: KooshaPari/phenoShared/.github/workflows/vitepress-pages.yml@main
    with:
      concurrency_group: pheno-vitepress-pages
    permissions:
      contents: read
      pages: write
      id-token: write
