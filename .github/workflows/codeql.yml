name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '17 4 * * 1'

permissions:
  contents: read

jobs:
  analyze:
    uses: KooshaPari/phenoShared/.github/workflows/reusable/codeql.yml@051ecbc901964f3c7ad137b03bc62c7d3bef5d01
    permissions:
      contents: read
      actions: read
      security-events: write
    with:
      languages: '["rust"]'
      build-mode: 'autobuild'
