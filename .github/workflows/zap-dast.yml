name: ZAP DAST

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'src/**'
      - '.github/workflows/zap-dast.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'src/**'
      - '.github/workflows/zap-dast.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  zap:
    runs-on: ubuntu-latest
    steps:
      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: 'https://kooshapari.github.io/pheno/'
          docker_name: 'ghcr.io/zaproxy/zaproxy:stable'
          allow_issue_writing: false
          fail_action: true
